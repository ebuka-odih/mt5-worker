version: "3.8"

services:
  brain:
    build: .
    container_name: forex-brain
    ports:
      - "8780:8780"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8780/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
