services:
  brain:
    build: .
    container_name: forex-brain-atlas-50k-instant
    command: ["python", "-m", "uvicorn", "brain.api.server:app", "--host", "0.0.0.0", "--port", "8783"]
    ports:
      - "8783:8783"
    volumes:
      - ./config/settings.atlas-50k-instant.yaml:/app/config/settings.yaml:ro
      - ./data-atlas-50k-instant:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8783/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
